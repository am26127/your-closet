<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Closet - Premium Clothing Marketplace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .logo {
            font-size: 28px;
            font-weight: 900;
            color: #667eea;
        }
        .search-bar {
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            width: 300px;
        }
        nav button {
            background: none;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: 600;
        }
        nav button.active {
            background: #667eea;
            color: white;
            border-radius: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .carousel {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .carousel-image {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
        }
        .carousel-title {
            font-size: 32px;
            font-weight: 900;
            color: #333;
        }
        .carousel-price {
            font-size: 28px;
            color: #667eea;
            font-weight: bold;
        }
        .carousel-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
        }
        .section-title {
            font-size: 28px;
            font-weight: 900;
            color: white;
            margin-bottom: 30px;
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }
        .item-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .item-card:hover {
            transform: translateY(-8px);
        }
        .item-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        .item-info {
            padding: 20px;
        }
        .item-name {
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 8px;
        }
        .item-price {
            font-size: 20px;
            font-weight: 900;
            color: #667eea;
            margin-bottom: 12px;
        }
        .item-actions {
            display: flex;
            gap: 10px;
        }
        .item-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-buy {
            background: #667eea;
            color: white;
        }
        .btn-offer {
            background: #f0f0f0;
        }
        .form-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .form-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 30px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group label {
            font-weight: 700;
            margin-bottom: 8px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }
        .submit-btn {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
        }
        footer {
            text-align: center;
            padding: 30px 20px;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">👕 Your Closet</div>
        <input type="text" class="search-bar" id="searchBar" placeholder="Search items...">
        <nav>
            <button onclick="showTab('home')" class="active">Home</button>
            <button onclick="showTab('buy')">Buy</button>
            <button onclick="showTab('sell')">Sell</button>
            <button onclick="showTab('earnings')">Earnings</button>
        </nav>
    </header>

    <div class="container">
        <div id="home" class="tab-content active">
            <div class="carousel">
                <div class="carousel-image" id="emoji">👕</div>
                <div class="carousel-title" id="title">Nike Air Jordan 1</div>
                <div class="carousel-price" id="price">$250</div>
                <button class="carousel-btn" onclick="prev()">← Previous</button>
                <button class="carousel-btn" onclick="next()">Next →</button>
            </div>
            <div class="section-title">✨ Featured Items</div>
            <div class="items-grid" id="grid"></div>
        </div>

        <div id="buy" class="tab-content">
            <div class="section-title">🛍️ Browse & Buy</div>
            <div class="items-grid" id="buyGrid"></div>
        </div>

        <div id="sell" class="tab-content">
            <div class="form-container">
                <div class="form-title">📤 List Your Item</div>
                <form onsubmit="sell(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Item Name</label>
                            <input type="text" required>
                        </div>
                        <div class="form-group">
                            <label>Price</label>
                            <input type="number" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" required>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">List Item</button>
                </form>
            </div>
        </div>

        <div id="earnings" class="tab-content">
            <div class="form-container">
                <div class="form-title">💰 Your Earnings</div>
                <div style="text-align: center; padding: 40px;">
                    <div style="font-size: 48px; font-weight: 900; color: #667eea;">$<span id="earnings">0.00</span></div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        Your Closet | 📞 647-228-2605 | © 2026
    </footer>

    <script>
        let items = [
            { emoji: '👟', name: 'Nike Air Jordan 1', price: 250 },
            { emoji: '👕', name: 'Vintage Supreme Tee', price: 150 },
            { emoji: '🎒', name: 'Limited Bape Backpack', price: 400 },
            { emoji: '⌚', name: 'Vintage Rolex', price: 800 },
            { emoji: '👖', name: 'Levi\'s 501 Jeans', price: 80 },
            { emoji: '🧥', name: 'Adidas Yeezy Jacket', price: 350 }
        ];

        let index = 0;

        function render() {
            document.getElementById('emoji').textContent = items[index].emoji;
            document.getElementById('title').textContent = items[index].name;
            document.getElementById('price').textContent = '$' + items[index].price;
            
            const html = items.map(item => `
                <div class="item-card">
                    <div class="item-image">${item.emoji}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">$${item.price}</div>
                        <div class="item-actions">
                            <button class="item-actions button btn-buy">Buy</button>
                            <button class="item-actions button btn-offer">Offer</button>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('grid').innerHTML = html;
            document.getElementById('buyGrid').innerHTML = html;
        }

        function next() {
            index = (index + 1) % items.length;
            render();
        }

        function prev() {
            index = (index - 1 + items.length) % items.length;
            render();
        }

        function showTab(name) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function sell(e) {
            e.preventDefault();
            alert('Item listed! 🎉');
            e.target.reset();
        }

        render();
    </script>
</body>
</html>
